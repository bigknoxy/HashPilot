name: GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-gh-pages@v3
        id: deploy
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages

      - name: Wait for Pages build
        run: sleep 15

      - name: Install agent-browser
        run: |
          npm install -g agent-browser
          agent-browser install

      - name: Verify site with browser automation
        run: |
          SITE_URL="https://bigknoxy.github.io/HashPilot/"
          agent-browser open "$SITE_URL"
          agent-browser wait --load networkidle

          # Check title
          TITLE=$(agent-browser eval "document.title")
          echo "Title: $TITLE"

          # Check body text contains branding
          HAS_PILOT=$(agent-browser eval "document.body.innerText.includes('HashPilot')")
          echo "Has HashPilot in body: $HAS_PILOT"

          if [ "$HAS_PILOT" = "true" ]; then
            echo "✓ Site loads correctly — HashPilot branding found"
          else
            echo "✗ Site verification failed — HashPilot branding missing"
            agent-browser screenshot /tmp/deploy-failed.png
            exit 1
          fi
          agent-browser screenshot /tmp/deploy-verified.png
          agent-browser close
